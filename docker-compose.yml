services:
  postgres:
    image: postgres:15
    container_name: delivery_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deliveries
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery_api
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/deliveries
      PORT: 3000
    ports:
      - "3000:3000"
    command: sh -c "npm run db:migrate && npm run dev"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: delivery_worker
    depends_on:
      - postgres
      - api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/deliveries
      PORT: 3000
    command: npm run worker

volumes:
  postgres_data:
