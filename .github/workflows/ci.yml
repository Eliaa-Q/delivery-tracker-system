name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Run unit tests
        run: npm run test

  docker:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/deliveries

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Start services
        run: docker compose up -d

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            docker exec delivery_postgres pg_isready -U postgres -d deliveries && exit 0
            sleep 3
          done
          exit 1

      - name: Run migrations
        run: npm run db:migrate

      - name: Check containers
        run: docker compose ps

      - name: Shutdown
        if: always()
        run: docker compose down
